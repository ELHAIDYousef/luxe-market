version: "3.9"

services:

  db:
    image: postgres:16-alpine
    container_name: luxemarket_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     luxe_user
      POSTGRES_PASSWORD: luxe_pass
      POSTGRES_DB:       luxemarket
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luxe_user -d luxemarket"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: luxemarket_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://luxe_user:luxe_pass@db:5432/luxemarket
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads   # ← persists uploaded images across restarts
    command: >
      sh -c "python seed.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: luxemarket_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000/api/v1

volumes:
  postgres_data:
  uploads_data:    # named volume — survives container restarts
